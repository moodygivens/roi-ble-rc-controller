<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Two-Wheel Car Controller</title>
    <style>
        :root {
            --bg-color: #121212;
            --circle-color: #2a2a2a;
            --handle-color: #ff4757;
            --text-color: #ffffff;
            --btn-color: #2ed573;
            --reload-color: #57606f;
        }
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            touch-action: none;
            padding: 20px 0 calc(20px + env(safe-area-inset-bottom)); /* Protects from mobile navigation bars */
            box-sizing: border-box;
        }
        #connect-btn {
            background-color: var(--btn-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(46, 213, 115, 0.3);
            z-index: 20;
            margin-top: 10px;
        }
        #connect-btn.connected {
            background-color: #ff4757;
            box-shadow: 0 4px 10px rgba(255, 71, 87, 0.3);
        }
        #joystick-container {
            position: relative;
            width: 70vw;
            height: 70vw;
            max-width: 320px;
            max-height: 320px;
            background-color: var(--circle-color);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        #joystick-handle {
            position: absolute;
            width: 15vw;
            height: 15vw;
            max-width: 65px;
            max-height: 65px;
            background-color: var(--handle-color);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 10;
        }
        #output-panel {
            display: flex;
            gap: 40px;
            color: var(--text-color);
            text-align: center;
        }
        .motor-val {
            font-size: 2rem;
            font-weight: bold;
            display: block;
        }
        .label {
            font-size: 0.8rem;
            text-transform: uppercase;
            opacity: 0.7;
        }
        #reload-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            width: 100%;
            z-index: 30;
            margin-bottom: 5px;
        }
        #reload-btn {
            background-color: var(--reload-color);
            color: #ced6e0;
            border: none;
            padding: 8px 18px;
            font-size: 0.8rem;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            opacity: 0.8;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        #reload-btn:active {
            opacity: 1;
        }
        #version-tag {
            color: #57606f;
            font-size: 0.75rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <button id="connect-btn">Connect to Car</button>

    <div id="joystick-container">
        <div id="joystick-handle"></div>
    </div>

    <div id="output-panel">
        <div>
            <span class="label">Left Wheel</span>
            <span id="left-val" class="motor-val">0</span>
        </div>
        <div>
            <span class="label">Right Wheel</span>
            <span id="right-val" class="motor-val">0</span>
        </div>
    </div>

    <div id="reload-container">
        <button id="reload-btn">Force Clear Cache & Reload</button>
        <div id="version-tag">Build: v1.2</div>
    </div>

    <script>
        const container = document.getElementById('joystick-container');
        const handle = document.getElementById('joystick-handle');
        const leftDisplay = document.getElementById('left-val');
        const rightDisplay = document.getElementById('right-val');
        const connectBtn = document.getElementById('connect-btn');
        const reloadBtn = document.getElementById('reload-btn');

        let rect, centerX, centerY, maxRadius;

        const NORDIC_UART_SERVICE = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
        const RX_CHARACTERISTIC = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';

        let bleDevice = null;
        let rxChar = null;
        let lastSentTime = 0;

        // Force reload event listener
        reloadBtn.addEventListener('click', () => {
            window.location.href = window.location.pathname + '?reload=' + Date.now();
        });

        function updateDimensions() {
            rect = container.getBoundingClientRect();
            centerX = rect.left + rect.width / 2;
            centerY = rect.top + rect.height / 2;
            maxRadius = rect.width / 2;
        }

        window.addEventListener('resize', updateDimensions);
        updateDimensions();

        connectBtn.addEventListener('click', async () => {
            if (bleDevice && bleDevice.gatt.connected) {
                await bleDevice.gatt.disconnect();
                return;
            }

            try {
                connectBtn.textContent = "Scanning...";
                
                bleDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [NORDIC_UART_SERVICE] }],
                    optionalServices: [
                        NORDIC_UART_SERVICE,
                        '0000180f-0000-1000-8000-00805f9b34fb',
                        '0000180a-0000-1000-8000-00805f9b34fb'
                    ]
                });

                bleDevice.addEventListener('gattserverdisconnected', onDisconnected);

                const server = await bleDevice.gatt.connect();
                const service = await server.getPrimaryService(NORDIC_UART_SERVICE);
                rxChar = await service.getCharacteristic(RX_CHARACTERISTIC);

                connectBtn.textContent = "Disconnect";
                connectBtn.classList.add('connected');
                alert("Connected successfully to host!");
            } catch (error) {
                console.error(error);
                connectBtn.textContent = "Connect to Car";
                alert("Connection failed: " + error.message);
            }
        });

        function onDisconnected() {
            connectBtn.textContent = "Connect to Car";
            connectBtn.classList.remove('connected');
            rxChar = null;
            alert("Bluetooth Disconnected.");
        }

        async function sendDataBluetooth(left, right) {
            if (!rxChar) return;

            const now = performance.now();
            if (now - lastSentTime < 50 && left !== 0 && right !== 0) return;
            lastSentTime = now;

            try {
                const buffer = new Int8Array([left, right]);
                await rxChar.writeValueWithoutResponse(buffer);
            } catch (error) {
                console.error("Transmission error:", error);
            }
        }

        function getWheelSpeeds(x, y) {
            let left = y + x;
            let right = y - x;
            const maxVal = Math.max(Math.abs(left), Math.abs(right));

            if (maxVal > 100) {
                const scale = 100 / maxVal;
                left *= scale;
                right *= scale;
            }
            return { left: Math.round(left), right: Math.round(right) };
        }

        function handleInput(e) {
            e.preventDefault();
            const touch = e.touches ? e.touches[0] : e;
            let x = touch.clientX - centerX;
            let y = centerY - touch.clientY;

            const distance = Math.sqrt(x * x + y * y);
            if (distance > maxRadius) {
                const scale = maxRadius / distance;
                x *= scale;
                y *= scale;
            }

            handle.style.transform = `translate(${x}px, ${-y}px)`;
            const mappedX = (x / maxRadius) * 100;
            const mappedY = (y / maxRadius) * 100;

            const speeds = getWheelSpeeds(mappedX, mappedY);
            updateDisplay(speeds.left, speeds.right);
            sendDataBluetooth(speeds.left, speeds.right);
        }

        function resetJoystick() {
            handle.style.transform = `translate(0px, 0px)`;
            updateDisplay(0, 0);
            sendDataBluetooth(0, 0);
        }

        function updateDisplay(l, r) {
            leftDisplay.textContent = l;
            rightDisplay.textContent = r;
        }

        container.addEventListener('touchstart', handleInput);
        container.addEventListener('touchmove', handleInput);
        container.addEventListener('touchend', resetJoystick);

        container.addEventListener('mousedown', (e) => {
            handleInput(e);
            window.addEventListener('mousemove', handleInput);
            window.addEventListener('mouseup', () => {
                window.removeEventListener('mousemove', handleInput);
                resetJoystick();
            }, { once: true });
        });
    </script>
</body>
</html>
